name: DevOps CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Run Python App
      run: python3 app.py

    - name: Build Docker Image
      run: docker build -t my-app .

    - name: Run Docker Container
      run: docker run my-app
