name: DevOps Project Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install Python
      run: sudo apt install python3 python3-pip -y

    - name: Install dependencies
      run: pip3 install pytest

    - name: Run Tests
      run: pytest

    - name: Run App
      run: python3 app.py

    - name: Build Docker Image
      run: docker build -t devops-app .

    - name: Run Docker Container
      run: docker run devops-app
